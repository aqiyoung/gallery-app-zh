name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE }}
        run: |
          echo $ENCODED_KEYSTORE | base64 -d > app/release-keystore.jks
        working-directory: .

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Debug APK (fallback)
        if: failure()
        run: ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk "GoogleAI-Edge-Gallery-zh-${VERSION}.apk"
          else
            mv app/build/outputs/apk/debug/app-debug.apk "GoogleAI-Edge-Gallery-zh-${VERSION}-debug.apk"
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "*.apk"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          generate_release_notes: true
          draft: false
          prerelease: false
